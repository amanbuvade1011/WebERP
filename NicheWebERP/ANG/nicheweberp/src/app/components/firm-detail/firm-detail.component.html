<div class="page">
  <div class="page-header d-flex align-items-center gap-3">
    <button type="button" class="back-btn" (click)="goBack()" aria-label="Back to firms">
      <svg viewBox="0 0 20 20" fill="none" width="16" height="16">
        <path d="M12.5 15L7.5 10L12.5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </button>
    <div>
      <h1 class="page-title mb-1">{{ isNew ? 'New wholesale customer' : (firm?.tradingName || 'Firm') }}</h1>
      <p class="page-subtitle mb-0">{{ isNew ? 'Create a new firm' : firm?.code }}</p>
    </div>
  </div>

  <div class="data-card" *ngIf="loading">
    <div class="state-panel">
      <span class="spinner spinner-lg"></span>
      <p class="state-title">Loading…</p>
    </div>
  </div>

  <div class="data-card" *ngIf="!loading && error">
    <div class="state-panel">
      <p class="state-title">Couldn't load this firm</p>
    </div>
  </div>

  <form class="data-card profile-card" *ngIf="!loading && !error" (ngSubmit)="save()">
    <h2 class="section-title mb-3">Details</h2>

    <div class="profile-form-grid">
      <div class="field-group">
        <label class="form-label">Trading name</label>
        <input type="text" class="form-control" name="tradingName" [(ngModel)]="form.tradingName" />
      </div>
      <div class="field-group">
        <label class="form-label">Company name</label>
        <input type="text" class="form-control" name="companyName" [(ngModel)]="form.companyName" />
      </div>
      <div class="field-group" *ngIf="isNew">
        <label class="form-label">Code (optional, auto-generated if blank)</label>
        <input type="text" class="form-control" name="code" [(ngModel)]="form.code" />
      </div>
      <div class="field-group" *ngIf="isNew">
        <label class="form-label">Type</label>
        <select class="form-control" name="entityClassName" [(ngModel)]="form.entityClassName">
          <option value="WholesaleCustomer">Wholesale Customer</option>
          <option value="Agent">Agent</option>
        </select>
      </div>
      <div class="field-group">
        <label class="form-label">Address</label>
        <input type="text" class="form-control" name="address" [(ngModel)]="form.address" />
      </div>
      <div class="field-group">
        <label class="form-label">Suburb</label>
        <input type="text" class="form-control" name="suburb" [(ngModel)]="form.suburb" />
      </div>
      <div class="field-group">
        <label class="form-label">State</label>
        <input type="text" class="form-control" name="state" [(ngModel)]="form.state" />
      </div>
      <div class="field-group">
        <label class="form-label">Postcode</label>
        <input type="text" class="form-control" name="postcode" [(ngModel)]="form.postcode" />
      </div>
      <div class="field-group">
        <label class="form-label">Phone</label>
        <input type="text" class="form-control" name="phone1" [(ngModel)]="form.phone1" />
      </div>
      <div class="field-group">
        <label class="form-label">Secondary phone</label>
        <input type="text" class="form-control" name="phone2" [(ngModel)]="form.phone2" />
      </div>
      <div class="field-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" name="generalEmail" [(ngModel)]="form.generalEmail" />
      </div>
      <div class="field-group">
        <label class="form-label">Trading terms</label>
        <select class="form-control" name="termsId" [(ngModel)]="form.termsId">
          <option value="">None</option>
          <option *ngFor="let t of terms" [value]="t.id">{{ t.description }}</option>
        </select>
      </div>
      <div class="field-group">
        <label class="form-label">Price point</label>
        <select class="form-control" name="pricePointId" [(ngModel)]="form.pricePointId">
          <option value="">None</option>
          <option *ngFor="let p of pricePoints" [value]="p.id">{{ p.name }}</option>
        </select>
      </div>
      <div class="field-group">
        <label class="form-label">Credit limit</label>
        <input type="number" step="0.01" class="form-control" name="creditLimit" [(ngModel)]="form.creditLimit" />
      </div>
      <div class="field-group">
        <label class="form-label">Discount %</label>
        <input type="number" step="0.01" class="form-control" name="discountPercent1" [(ngModel)]="form.discountPercent1" />
      </div>
      <div class="field-group">
        <label class="form-label">Deposit %</label>
        <input type="number" step="0.01" class="form-control" name="depositPercent" [(ngModel)]="form.depositPercent" />
      </div>
      <div class="field-group field-group-checkbox">
        <label class="form-label">&nbsp;</label>
        <label class="checkbox-label">
          <input type="checkbox" name="allowOrder" [(ngModel)]="form.allowOrder" />
          Allow orders
        </label>
      </div>
      <div class="field-group field-group-checkbox">
        <label class="form-label">&nbsp;</label>
        <label class="checkbox-label">
          <input type="checkbox" name="allowInvoice" [(ngModel)]="form.allowInvoice" />
          Allow invoicing
        </label>
      </div>
      <div class="field-group field-group-checkbox" *ngIf="!isNew">
        <label class="form-label">&nbsp;</label>
        <label class="checkbox-label">
          <input type="checkbox" name="inactive" [(ngModel)]="form.inactive" />
          Inactive
        </label>
      </div>
    </div>

    <div class="alert-error mt-3" *ngIf="saveError">{{ saveError }}</div>

    <button type="submit" class="btn-primary-action mt-3" [disabled]="saving">
      <span class="spinner" *ngIf="saving"></span>
      {{ saving ? 'Saving…' : (isNew ? 'Create firm' : 'Save changes') }}
    </button>
  </form>
</div>
