<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Nicheweberp</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script>
    // Applies the saved theme before first paint so there's no flash of the
    // wrong theme while Angular boots. Keep in sync with ThemeService.
    (function () {
      try {
        var saved = localStorage.getItem('niche_erp_theme');
        if (saved === 'light' || saved === 'dark') {
          document.documentElement.setAttribute('data-theme', saved);
        }
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
